name: Python CI

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # STEP 1: Must always pull down code FIRST so files like requirements.txt exist in the workspace
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # STEP 2: Initialize runtime setup after files are pulled down
    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt' # Explicitly guides the runner to your root file

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk tk-dev libx11-dev

    - name: Install Python Package Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 requests psutil customtkinter

    - name: Lint Code Architecture (Flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify Module Compilation and Package Integrity
      run: |
        python -m compileall src/

    - name: Lint Code Architecture (Flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify Module Compilation and Package Integrity
      run: |
        python -m compileall src/

    - name: Run Automated Regression Tests
      run: |
        python -m unittest discover -s src -p "test_*.py"