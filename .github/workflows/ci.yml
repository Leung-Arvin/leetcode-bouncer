name: Python CI

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Install basic X11 display frameworks so CustomTkinter modules can safely initialize in headless environments
        sudo apt-get install -y python3-tk tk-dev libx11-dev

    - name: Install Python Package Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install linters and core app requirements
        pip install flake8 requests psutil customtkinter

    - name: Lint Code Architecture (Flake8)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all typos/formatting as warnings so your tests still run
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify Module Compilation and Package Integrity
      run: |
        # Verifies that Python can parse, compile, and locate all internal relative directory scripts cleanly
        python -m compileall src/